<div class="error-state" *ngIf="error">
  <p>{{ error }}</p>
  <a routerLink="/news" class="back-link">&larr; Back to News</a>
</div>

<div class="loading-state" *ngIf="loading">
  <div class="spinner"></div>
  <p>Loading article...</p>
</div>

<div class="article-page" *ngIf="mission">
  <div class="article-hero"
    [style.background-image]="'url(' + (mission.imageUrl || 'https://images.unsplash.com/photo-1517976487492-5750f3195933?q=80&w=2070&auto=format&fit=crop') + ')'">
    <div class="hero-overlay"></div>
    <div class="hero-content container">
      <span class="tag">{{ mission.agencyName || 'News' }}</span>
      <h1 class="article-title">{{ mission.title }}</h1>
    </div>
  </div>

  <div class="container article-container">
    <a routerLink="/news" class="back-link">&larr; Back to News</a>

    <div class="article-content">
      <p class="lead-text">{{ mission.payloadDescription }}</p>

      <div class="body-text" *ngIf="mission.newsArticleBody">
        {{ mission.newsArticleBody }}
      </div>
      <div class="body-text" *ngIf="!mission.newsArticleBody">
        No full article content available for this update.
      </div>
    </div>
  </div>
</div>
