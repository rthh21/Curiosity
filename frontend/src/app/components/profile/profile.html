<div class="profile-container">
  <div class="profile-card">
    <div class="profile-header">
      <h2>Your Profile</h2>
      <p>Update your personal information.</p>
    </div>

    <div *ngIf="isLoading" class="loading-state">
      <div class="spinner"></div>
      <p>Loading profile data...</p>
    </div>

    <div *ngIf="!isLoading" class="profile-content">
      <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
      <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>

      <form (ngSubmit)="onSave()" class="profile-form">
        
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" [(ngModel)]="profileData.email" name="email" disabled class="disabled-input" title="Email cannot be changed">
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" [(ngModel)]="profileData.username" name="username" required>
        </div>

        <div class="form-row">
          <div class="form-group half">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" [(ngModel)]="profileData.firstName" name="firstName">
          </div>
          
          <div class="form-group half">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" [(ngModel)]="profileData.lastName" name="lastName">
          </div>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" [(ngModel)]="profileData.phoneNumber" name="phone">
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" [disabled]="isSaving">
            <span *ngIf="!isSaving">Save Changes</span>
            <span *ngIf="isSaving">Saving...</span>
          </button>
          <button type="button" class="btn btn-secondary" (click)="logout()">Log Out</button>
        </div>
      </form>
    </div>
  </div>
</div>
